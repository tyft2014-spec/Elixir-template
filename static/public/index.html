<!DOCTYPE html>
<html class="h-full min-h-full" lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Branding Metadata -->
    <meta content="Scott Unblocker - Access Everything" property="og:title" />
    <meta content="The fastest way to browse the web without limits." property="og:description" />
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="./index.css">
    
    <title>Scott Unblocker | No Limits</title>
    <link rel="manifest" href="./assets/manifest.json">
  </head>
  <body id="main" class="h-full min-h-full bg-gray-900 text-white">

    <!-- Announcement (Branded Orange) -->
    <div id="announcement" class="hidden absolute w-full pt-5 pr-5">
      <div id="toast-default" class="flex float-right m-auto items-center w-full max-w-xs p-4 rounded-lg shadow bg-orange-600" role="alert">
        <div class="inline-flex items-center justify-center flex-shrink-0 w-8 h-8 rounded-lg bg-white text-orange-600">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 448 512"><path d="M224 0c-17.7 0-32 14.3-32 32V51.2C119 66 64 130.6 64 208v18.8c0 47-17.3 92.4-48.5 127.6l-7.4 8.3c-8.4 9.4-10.4 22.9-5.3 34.4S19.4 416 32 416H416c12.6 0 24-7.4 29.2-18.9s3.1-25-5.3-34.4l-7.4-8.3C401.3 319.2 384 273.9 384 226.8V208c0-77.4-55-142-128-156.8V32c0-17.7-14.3-32-32-32zm45.3 493.3c12-12 18.7-28.3 18.7-45.3H224 160c0 17 6.7 33.3 18.7 45.3s28.3 18.7 45.3 18.7s33.3-6.7 45.3-18.7z"/></svg>
        </div>
        <div id="notification-text" class="ml-3 text-sm font-bold text-white">SCOTT SYSTEM READY</div>
        <button onclick="closeAnnouncement()" type="button" class="ml-auto -mx-1.5 -my-1.5 rounded-lg p-1.5 hover:bg-orange-700 inline-flex h-8 w-8 text-white">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>
        </button>
      </div>
    </div>

    <!-- Sidebar (Scott Branding) -->
    <div id="sidebar" class="flex">
      <div class="fixed top-0 left-0 h-screen w-16 m-0 flex flex-col bg-black text-white shadow-lg border-r border-orange-600/30">
        
        <!-- Home / Brand Icon -->
        <div id="icon-home" onclick="openPage('home'); selectedIcon('icon-home');" class="sidebar-icon sidebar-icon-selected group">
          <span class="text-orange-500 font-black text-xl">S</span>
          <span class="sidebar-tooltip group-hover:scale-100">Scott Home</span>
        </div>

        <!-- Search / Proxy Icon -->
        <div id="icon-search" onclick="openPage('search'); selectedIcon('icon-search');" class="sidebar-icon group">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
          <span class="sidebar-tooltip group-hover:scale-100">Launch Proxy</span>
        </div>

        <!-- Settings -->
        <div id="icon-settings" onclick="openPage('settings'); selectedIcon('icon-settings');" class="sidebar-icon group">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37a1.724 1.724 0 002.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          <span class="sidebar-tooltip group-hover:scale-100">Settings</span>
        </div>
      </div>
    </div>

    <!-- Main Content Area -->
    <div class="ml-16 p-10 flex flex-col items-center justify-center h-screen">
        <h1 class="text-6xl font-black tracking-tighter uppercase">SCOTT <span class="text-orange-500">UNBLOCKER</span></h1>
        <p class="text-gray-400 mt-2 mb-8 text-lg">Blazingly fast. Fully branded. No math homework here.</p>
        
        <!-- The Actual Proxy Input (Make sure this matches the Elixir script expectations) -->
        <form id="uv-form" class="flex w-full max-w-2xl gap-3">
            <input id="uv-address" type="text" placeholder="Enter URL or search Google..." 
            class="flex-1 bg-gray-800 border-2 border-gray-700 p-4 rounded-xl focus:border-orange-500 outline-none text-white transition-all">
            <button type="submit" class="bg-orange-600 hover:bg-orange-500 px-8 py-4 rounded-xl font-bold uppercase tracking-widest transition-all shadow-lg shadow-orange-600/20">
                Go
            </button>
        </form>
    </div>

    <!-- Ultraviolet Logic -->
    <script src="/uv/uv.bundle.js" defer></script>
    <script src="/uv/uv.config.js" defer></script>
    <!-- Your main JS file should handle the form submit -->

  </body>
</html>
